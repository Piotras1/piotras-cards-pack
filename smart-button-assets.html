<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piotras Smart Button — Asset Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0f;
            --surface: #141418;
            --surface2: #1c1c22;
            --border: #2a2a35;
            --accent: #f0a040;
            --accent2: #ff6b35;
            --text: #e8e8f0;
            --text-muted: #7a7a90;
            --success: #3ecf6e;
            --radius: 12px;
        }
        [data-theme="light"] {
            --bg: #f0f0f5;
            --surface: #ffffff;
            --surface2: #f8f8fc;
            --border: #e0e0ea;
            --text: #1a1a2e;
            --text-muted: #666688;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        /* ── Header ── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 200;
            backdrop-filter: blur(12px);
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .logo-text { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; }
        .logo-text span { color: var(--accent); }
        .header-right { display: flex; align-items: center; gap: 10px; }
        .theme-btn {
            background: var(--surface2); border: 1px solid var(--border);
            color: var(--text); padding: 7px 13px; border-radius: 8px;
            cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }
        .theme-btn:hover { background: var(--border); }
        .github-btn {
            background: var(--accent); border: none; color: #000;
            padding: 7px 15px; border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
            text-decoration: none; transition: opacity 0.2s;
        }
        .github-btn:hover { opacity: 0.85; }

        /* ── Hero ── */
        .hero {
            padding: 52px 32px 36px;
            text-align: center; max-width: 680px; margin: 0 auto;
        }
        .hero h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 40px; font-weight: 700; line-height: 1.1; margin-bottom: 14px;
        }
        .hero h1 span { color: var(--accent); }
        .hero p { color: var(--text-muted); font-size: 14px; line-height: 1.7; }
        .hero-hint {
            display: inline-flex; align-items: center; gap: 6px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 5px 14px;
            font-size: 12px; color: var(--text-muted); margin-top: 16px;
        }

        /* ── Main ── */
        main { max-width: 1200px; margin: 0 auto; padding: 0 32px 60px; }

        /* ── Category grid ── */
        #home-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .category-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.22s;
            overflow: hidden;
            position: relative;
        }
        .category-card:hover {
            border-color: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(240,160,64,0.14);
        }

        /* Name bar on top */
        .cat-header {
            padding: 13px 16px;
            display: flex; align-items: center; gap: 8px;
            background: var(--surface);
            position: relative; z-index: 2;
            border-bottom: 1px solid var(--border);
        }
        .cat-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 17px; font-weight: 700;
            flex: 1;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* Demo image area */
        .cat-demo {
            height: 160px;
            background: var(--surface2);
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
        }
        .cat-demo.no-demo {
            display: flex; align-items: center; justify-content: center;
            color: var(--border); font-size: 36px;
        }
        /* Gradient overlay so footer is readable */
        .cat-demo::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 60%);
        }
        .category-card:hover .cat-demo::after {
            background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, rgba(240,160,64,0.08) 100%);
        }

        /* Footer bar */
        .cat-footer {
            padding: 10px 16px;
            display: flex; align-items: center; justify-content: space-between;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }
        .cat-count {
            font-size: 12px; color: var(--text-muted);
            background: var(--surface2); padding: 3px 10px;
            border-radius: 20px; border: 1px solid var(--border);
        }
        .cat-arrow { color: var(--accent); font-size: 18px; transition: transform 0.2s; }
        .category-card:hover .cat-arrow { transform: translateX(4px); }

        /* ── Gallery view ── */
        #gallery-view { display: none; }
        .gallery-header {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 28px; padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .back-btn {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text); padding: 7px 15px; border-radius: 8px;
            cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif;
            display: flex; align-items: center; gap: 6px;
            transition: all 0.2s; white-space: nowrap;
        }
        .back-btn:hover { border-color: var(--accent); color: var(--accent); }
        .gallery-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 26px; font-weight: 700;
        }
        .gallery-subdesc { font-size: 13px; color: var(--text-muted); margin-left: auto; }

        /* ── Image grid ── */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
            gap: 14px;
        }
        .image-item {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: all 0.2s;
            animation: fadeIn 0.3s ease forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .image-item:hover { border-color: var(--accent); box-shadow: 0 6px 20px rgba(240,160,64,0.1); }
        .img-thumb {
            width: 100%; aspect-ratio: 1;
            object-fit: cover; display: block;
            background: var(--surface2);
            cursor: zoom-in;
            transition: transform 0.2s;
        }
        .image-item:hover .img-thumb { transform: scale(1.04); }
        .img-footer { padding: 8px 10px; }
        .img-name {
            font-size: 11px; color: var(--text-muted);
            margin-bottom: 7px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .download-btn {
            width: 100%; background: var(--success); color: #000;
            border: none; padding: 7px; border-radius: 6px;
            font-size: 12px; font-weight: 600; font-family: 'Inter', sans-serif;
            cursor: pointer; transition: opacity 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 4px;
        }
        .download-btn:hover { opacity: 0.85; }
        .download-btn.loading { opacity: 0.6; pointer-events: none; }

        /* ── Lightbox ── */
        #lightbox {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.93);
            z-index: 999;
            align-items: center; justify-content: center;
            cursor: zoom-out;
        }
        #lightbox.open { display: flex; animation: lbIn 0.18s ease; }
        @keyframes lbIn { from { opacity: 0; } to { opacity: 1; } }
        #lightbox img {
            max-width: 88vw; max-height: 86vh;
            object-fit: contain; border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            cursor: default;
            animation: lbImg 0.2s ease;
        }
        @keyframes lbImg {
            from { transform: scale(0.94); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }
        #lightbox-close {
            position: fixed; top: 20px; right: 24px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff; font-size: 20px;
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.2s;
        }
        #lightbox-close:hover { background: rgba(255,255,255,0.22); }
        #lightbox-name {
            position: fixed; bottom: 22px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.65);
            color: rgba(255,255,255,0.65);
            font-size: 12px; padding: 4px 14px; border-radius: 20px;
            white-space: nowrap;
        }

        /* ── States ── */
        .state-box { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .state-box .state-icon { font-size: 36px; margin-bottom: 14px; }
        .state-box p { font-size: 14px; }
        .spinner {
            width: 30px; height: 30px;
            border: 3px solid var(--border); border-top-color: var(--accent);
            border-radius: 50%; animation: spin 0.8s linear infinite;
            margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer {
            text-align: center; padding: 22px;
            border-top: 1px solid var(--border);
            color: var(--text-muted); font-size: 12px;
        }
        footer a { color: var(--accent); text-decoration: none; }

        @media (max-width: 600px) {
            header { padding: 14px 16px; }
            main { padding: 0 14px 40px; }
            .hero { padding: 36px 16px 28px; }
            .hero h1 { font-size: 30px; }
            #home-view { grid-template-columns: 1fr; }
            .image-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .gallery-subdesc { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-icon">🔘</div>
        <div class="logo-text">Piotras <span>Smart Button</span></div>
    </div>
    <div class="header-right">
        <button class="theme-btn" id="theme-toggle">🌗 Theme</button>
        <a class="github-btn" href="https://github.com/Piotras1/piotras-smart-button" target="_blank">⭐ GitHub</a>
    </div>
</header>

<div class="hero">
    <h1>Asset <span>Gallery</span></h1>
    <p>Ready-to-use background images for Piotras Smart Button cards.<br>
    Use as <code>background_image_on</code> or <code>background_image_off</code> in your YAML.</p>
    <div class="hero-hint">💡 Choose a category to browse and download</div>
</div>

<main>
    <div id="home-view"></div>
    <div id="gallery-view">
        <div class="gallery-header">
            <button class="back-btn" id="back-btn">← Back</button>
            <div class="gallery-title" id="gallery-title"></div>
            <div class="gallery-subdesc" id="gallery-subdesc"></div>
        </div>
        <div id="image-grid" class="image-grid"></div>
    </div>
</main>

<div id="lightbox">
    <button id="lightbox-close">✕</button>
    <img id="lightbox-img" src="" alt="">
    <div id="lightbox-name"></div>
</div>

<footer>
    Images by <a href="https://github.com/Piotras1" target="_blank">Piotras</a> &nbsp;·&nbsp;
    <a href="https://github.com/Piotras1/piotras-smart-button" target="_blank">Smart Button</a> &nbsp;·&nbsp;
    <a href="https://github.com/Piotras1/piotras-cards-pack" target="_blank">Cards Pack</a>
</footer>

<script>
    const REPO_OWNER = 'Piotras1';
    const REPO_NAME  = 'piotras-cards-pack';
    const BASE_PATH  = 'img';
    const API_BASE   = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents`;
    const RAW_BASE   = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/main`;

    // ── Theme ──
    const themeBtn = document.getElementById('theme-toggle');
    if (localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
    themeBtn.addEventListener('click', () => {
        const isLight = document.documentElement.getAttribute('data-theme') === 'light';
        document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
        localStorage.setItem('theme', isLight ? 'dark' : 'light');
    });

    // ── Views ──
    const homeView       = document.getElementById('home-view');
    const galleryView    = document.getElementById('gallery-view');
    const imageGrid      = document.getElementById('image-grid');
    const galleryTitle   = document.getElementById('gallery-title');
    const gallerySubdesc = document.getElementById('gallery-subdesc');

    document.getElementById('back-btn').addEventListener('click', () => {
        homeView.style.display = 'grid';
        galleryView.style.display = 'none';
    });

    // ── Lightbox ──
    const lightbox     = document.getElementById('lightbox');
    const lightboxImg  = document.getElementById('lightbox-img');
    const lightboxName = document.getElementById('lightbox-name');

    function openLightbox(url, name) {
        lightboxImg.src = url;
        lightboxName.textContent = name;
        lightbox.classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
        lightbox.classList.remove('open');
        lightboxImg.src = '';
        document.body.style.overflow = '';
    }
    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    // ── API with session cache ──
    async function apiFetch(path) {
        const key = 'gh_' + path;
        const cached = sessionStorage.getItem(key);
        if (cached) return JSON.parse(cached);
        const res = await fetch(`${API_BASE}/${path}`);
        if (!res.ok) throw new Error(`GitHub API ${res.status}`);
        const data = await res.json();
        sessionStorage.setItem(key, JSON.stringify(data));
        return data;
    }

    function isImage(name) { return /\.(png|jpg|jpeg|gif|webp|svg)$/i.test(name); }

    // Find demo file: looks for folderName_demo.* in the img/ root listing
    function findDemoUrl(rootFiles, folderName) {
        const demoFile = rootFiles.find(f =>
            f.type === 'file' &&
            isImage(f.name) &&
            f.name.toLowerCase().startsWith(folderName.toLowerCase() + '_demo.')
        );
        return demoFile ? `${RAW_BASE}/${BASE_PATH}/${demoFile.name}` : null;
    }

    // ── Load home ──
    async function loadCategories() {
        homeView.innerHTML = '<div class="state-box" style="grid-column:1/-1"><div class="spinner"></div><p>Loading categories...</p></div>';
        try {
            const rootItems = await apiFetch(BASE_PATH);
            const folders = rootItems.filter(i => i.type === 'dir');

            if (!folders.length) {
                homeView.innerHTML = '<div class="state-box" style="grid-column:1/-1"><div class="state-icon">📂</div><p>No categories found in <code>img/</code>.</p></div>';
                return;
            }

            homeView.innerHTML = '';
            folders.forEach(folder => {
                const demoUrl = findDemoUrl(rootItems, folder.name);

                const card = document.createElement('div');
                card.className = 'category-card';

                // Demo area
                let demoHtml;
                if (demoUrl) {
                    demoHtml = `<div class="cat-demo" style="background-image:url('${demoUrl}')"></div>`;
                } else {
                    demoHtml = `<div class="cat-demo no-demo">🖼️</div>`;
                }

                card.innerHTML = `
                    <div class="cat-header">
                        <span class="cat-name">${folder.name}</span>
                    </div>
                    ${demoHtml}
                    <div class="cat-footer">
                        <span class="cat-count" id="count-${folder.name}">Loading...</span>
                        <span class="cat-arrow">→</span>
                    </div>
                `;
                card.addEventListener('click', () => openCategory(folder.name));
                homeView.appendChild(card);

                // Load image count async
                apiFetch(`${BASE_PATH}/${folder.name}`).then(files => {
                    const imgs = files.filter(f => isImage(f.name));
                    const countEl = document.getElementById(`count-${folder.name}`);
                    if (countEl) countEl.textContent = `${imgs.length} image${imgs.length !== 1 ? 's' : ''}`;
                }).catch(() => {
                    const countEl = document.getElementById(`count-${folder.name}`);
                    if (countEl) countEl.textContent = '—';
                });
            });

        } catch (err) {
            homeView.innerHTML = `<div class="state-box" style="grid-column:1/-1"><div class="state-icon">⚠️</div><p>Failed to load.<br><small>${err.message}</small></p></div>`;
        }
    }

    // ── Open category ──
    async function openCategory(folderName) {
        galleryTitle.textContent = folderName;
        gallerySubdesc.textContent = '';
        imageGrid.innerHTML = '<div class="state-box" style="grid-column:1/-1"><div class="spinner"></div><p>Loading images...</p></div>';
        homeView.style.display = 'none';
        galleryView.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });

        try {
            const files = await apiFetch(`${BASE_PATH}/${folderName}`);
            const images = files.filter(f => isImage(f.name));

            if (!images.length) {
                imageGrid.innerHTML = '<div class="state-box" style="grid-column:1/-1"><div class="state-icon">🖼️</div><p>No images in this category yet.</p></div>';
                return;
            }

            imageGrid.innerHTML = '';
            images.forEach((file, idx) => {
                const rawUrl = `${RAW_BASE}/${BASE_PATH}/${folderName}/${file.name}`;
                const item = document.createElement('div');
                item.className = 'image-item';
                item.style.animationDelay = (idx * 0.035) + 's';
                item.innerHTML = `
                    <img class="img-thumb" src="${rawUrl}" alt="${file.name}" loading="lazy">
                    <div class="img-footer">
                        <div class="img-name">${file.name}</div>
                        <button class="download-btn" data-url="${rawUrl}" data-name="${file.name}">⬇ Download</button>
                    </div>
                `;
                item.querySelector('.img-thumb').addEventListener('click', () => openLightbox(rawUrl, file.name));
                item.querySelector('.download-btn').addEventListener('click', async e => {
                    e.stopPropagation();
                    const btn = e.currentTarget;
                    btn.classList.add('loading');
                    btn.textContent = 'Downloading...';
                    try {
                        const res = await fetch(btn.dataset.url);
                        const blob = await res.blob();
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = btn.dataset.name; a.click();
                        URL.revokeObjectURL(url);
                    } catch { alert('Download failed. Try again.'); }
                    finally { btn.classList.remove('loading'); btn.innerHTML = '⬇ Download'; }
                });
                imageGrid.appendChild(item);
            });

        } catch (err) {
            imageGrid.innerHTML = `<div class="state-box" style="grid-column:1/-1"><div class="state-icon">⚠️</div><p>Failed to load.<br><small>${err.message}</small></p></div>`;
        }
    }

    loadCategories();
</script>
</body>
</html>
